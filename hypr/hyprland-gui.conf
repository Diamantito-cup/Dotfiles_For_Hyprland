# Generated by HyprMod


# Environment
env = XCURSOR_THEME,VivianBLZ
env = XCURSOR_SIZE,21

general:border_size = 1
misc:vrr = 2
xwayland:force_zero_scaling = true

# Bezier curves
bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
bezier = easeOutQuint, 0.23, 1.0, 0.32, 1.0

# Animations
animation = windowsIn, 1, 2.9, easeOutQuint, slide
animation = windowsOut, 1, 1.49, linear, slide
animation = windowsMove, 1, 4.79, easeOutQuint, slide
animation = borderangle, 1, 1.0, default, once
animation = workspacesIn, 1, 1.21, almostLinear, slide
animation = workspacesOut, 1, 1.94, almostLinear, slide
animation = specialWorkspace, 1, 1.94, almostLinear, slide

# Monitors
monitor = HDMI-A-1, 1920x1080@50.00Hz, -1920x120, 1, cm, srgb

# Keybinds
unbind = SUPER, space
bind = SUPER, W, exec, wofi --show drun --allow-images --term kitty
bind = SUPER, space, exec, rofimoji
